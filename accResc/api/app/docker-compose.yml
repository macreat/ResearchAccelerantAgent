services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: research-agent-postgres
    environment:
      POSTGRES_DB: research_agent
      POSTGRES_USER: research
      POSTGRES_PASSWORD: research
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./docker/postgres/init:/docker-entrypoint-initdb.d:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U research -d research_agent"]
      interval: 10s
      timeout: 5s
      retries: 5

  ollama:
    image: ollama/ollama:latest
    container_name: research-agent-ollama
    volumes:
      - ollama-data:/root/.ollama
    ports:
      - "11434:11434"

  app:
    build:
      context: .
    container_name: research-agent-app
    depends_on:
      postgres:
        condition: service_healthy
      ollama:
        condition: service_started
    environment:
      NODE_ENV: production
      PORT: 3000
      APP_ID: research-agent
      APP_SECRET: change-me-before-production
      DATABASE_URL: postgres://research:research@postgres:5432/research_agent
      DOCS_DIR: /data/docs
      OUTPUT_DIR: /data/output
      OLLAMA_URL: http://ollama:11434
      ENABLE_LOCAL_LLM: "false"
    volumes:
      - ../db:/data/docs:ro
      - research-output:/data/output
    ports:
      - "3000:3000"

volumes:
  postgres-data:
    driver: local
  ollama-data:
    driver: local
  research-output:
    driver: local
