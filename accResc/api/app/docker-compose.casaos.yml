services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: research_agent
      POSTGRES_USER: research
      POSTGRES_PASSWORD: research
    volumes:
      - /DATA/AppData/research-agent/postgres:/var/lib/postgresql/data
      - ./docker/postgres/init:/docker-entrypoint-initdb.d:ro
    restart: unless-stopped

  ollama:
    image: ollama/ollama:latest
    volumes:
      - /DATA/AppData/research-agent/ollama:/root/.ollama
    ports:
      - "11434:11434"
    restart: unless-stopped

  app:
    build:
      context: .
    depends_on:
      - postgres
      - ollama
    environment:
      NODE_ENV: production
      PORT: 3000
      APP_ID: research-agent
      APP_SECRET: change-me-before-production
      DATABASE_URL: postgres://research:research@postgres:5432/research_agent
      DOCS_DIR: /data/docs
      OUTPUT_DIR: /data/output
      OLLAMA_URL: http://ollama:11434
      ENABLE_LOCAL_LLM: "false"
    volumes:
      - /DATA/AppData/research-agent/docs:/data/docs:ro
      - /DATA/AppData/research-agent/output:/data/output
    ports:
      - "3000:3000"
    restart: unless-stopped
