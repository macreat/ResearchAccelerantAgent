name: TeX compilation check

on:
  push:
    branches: ["main", "master", "dev"]
  pull_request:

jobs:
  compile-tex:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install TeX Live (minimal set)
        run: |
          sudo apt-get update -y
          sudo apt-get install -y --no-install-recommends texlive-latex-recommended texlive-latex-extra texlive-fonts-recommended texlive-fonts-extra

      - name: Create sample LaTeX file
        run: |
          cat > ./ci_sample.tex <<'EOF'
          \documentclass{article}
          \usepackage[utf8]{inputenc}
          \begin{document}
          Hello, TeX!
          \end{document}
          EOF

      - name: Compile sample.tex
        run: |
          pdflatex -interaction=nonstopmode -halt-on-error -output-directory=./ ./ci_sample.tex

      - name: List output
        run: ls -la ./ | sed -n '1,200p'

      - name: Upload compiled PDF as artifact (if generated)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ci-compiled-tex
          path: |
            ./ci_sample.pdf
            ./ci_sample.tex.pdflatex.log
